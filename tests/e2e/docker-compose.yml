# Docker Compose file for phero e2e tests.
# Starts Qdrant, PostgreSQL (with pgvector), NATS (JetStream), and Weaviate for
# tests that require external services.
#
# Usage:
#   docker compose -f e2e/docker-compose.yml up -d
#   docker compose -f e2e/docker-compose.yml down -v

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: phero
      POSTGRES_PASSWORD: phero
      POSTGRES_DB: phero
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phero"]
      interval: 5s
      timeout: 5s
      retries: 15

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nats-server --version || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 10

  weaviate:
    image: semitechnologies/weaviate:1.25.0
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
